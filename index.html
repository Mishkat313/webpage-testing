<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<style>
* {box-sizing: border-box}
body {font-family: sans-serif; margin: 0}

.header {
  padding: 80px;
  background: rgb(18, 78, 18);
  text-decoration: none;
  text-align: center;
  color: white;
  border: 5px solid grey;
}
.header h1{
  font-size: 100px
}
.header h2{
  font-size: 100px
}
.navbar {
  width: 100%;
  background-color: beige;
  overflow: auto;
}
.navbar a {
  float: left;
  padding: 12px;
  color: #911212;
  text-decoration: none;
  font-size: 17px;
}
.navbar a.right {
  float: right;
}
.navbar a:hover {
  background-color: #04AA6D;
  color: black;
}
.active {
  background-color: #04AA6D;
}


/* Slideshow container */
.slideshow-container {
  max-width: 600px;
  position: relative;
  margin: auto;
  background-color: dodgerblue;
  border: 10px green
}

/* Next & previous buttons */
.prev, .next {
  cursor: pointer;
  position: absolute;
  top: 50%;
  width: auto;
  padding: 16px;
  margin-top: -22px;
  color: rgb(206, 203, 203);
  font-weight: bold;
  font-size: 18px;
  transition: 0.6s ease;
  border-radius: 0 3px 3px 0;
  user-select: none;
}

/* Position the "next button" to the right */
.next {
  right: 0;
  border-radius: 3px 0 0 3px;
}

/* On hover, add a black background color with a little bit see-through */
.prev:hover, .next:hover {
  background-color: rgba(247, 247, 247, 0.8);
}

/* Caption text */
.text {
  color: rgb(68, 59, 59);
  font-size: 15px;
  padding: 8px 12px;
  position: absolute;
  bottom: 8px;
  width: 100%;
  text-align: center;
}

/* Number text (1/3 etc) */
.numbertext {
  color: #f2f2f2;
  font-size: 12px;
  padding: 8px 12px;
  position: absolute;
  top: 0;
}

/* The dots/bullets/indicators */
.dot {
  cursor: pointer;
  height: 15px;
  width: 15px;
  margin: 0 2px;
  background-color: #bbb;
  border-radius: 50%;
  display: inline-block;
  transition: background-color 0.6s ease;
}

.active, .dot:hover {
  background-color: #717171;
}

/* Fading animation */
.fade {
  -webkit-animation-name: fade;
  -webkit-animation-duration: 1.5s;
  animation-name: fade;
  animation-duration: 1.5s;
}

@media screen and (max-width: 500px) {
  .navbar a {
    float: none;
    display: block;
  }
}
</style>
</head>

<body>
  <div class="navbar">
  <a class="active" href="#"><i class="fa fa-fw fa-home"></i></a> 
  <a href="#"><i class="fa fa-group"></i> About Us</a> 
  <a href="#"><i class="fa fa-fw fa-envelope"></i> Contact</a> 
  <a href="#"><i class="fa fa-gears"></i> What we do</a>
  <a href="#"><i class="fa fa-map-signs"></i> Our journey</a>
  <a class="right" href="#"><i class="fa fa-handshake-o"></i> Donate</a>
</div>

<div class="header">
  <h1><em>Dream Basant</em></h1>
  <p>Dream Believe Create Succeed</p>
  </div>

<div class="slideshow-container">
<div class="mySlides fade">
  <div class="numbertext">1 / 3</div>
  <img src=".\FB_IMG_1642858559690.jpg" style="width:100%">
  <div class="text">Little CHamps</div>
</div>

<div class="mySlides fade">
  <div class="numbertext">2 / 3</div>
  <img src="./FB_IMG_1642858555324.jpg" style="width:100%">
  <div class="text">Little CHamps</div>
</div>

<div class="mySlides fade">
  <div class="numbertext">3 / 3</div>
  <img src="FB_IMG_1642858564765.jpg" style="width:100%">
  <div class="text">Little CHamps</div>
</div>

<a class="prev" onclick="plusSlides(-1)">&#10094;</a>
<a class="next" onclick="plusSlides(1)">&#10095;</a>

</div>
<br>

<div style="text-align:center">
  <span class="dot" onclick="currentSlide(1)"></span> 
  <span class="dot" onclick="currentSlide(2)"></span> 
  <span class="dot" onclick="currentSlide(3)"></span> 
</div>
<script>
  var slideIndex = 1;
  showSlides(slideIndex);
  
  function plusSlides(n) {
    showSlides(slideIndex += n);
  }
  
  function currentSlide(n) {
    showSlides(slideIndex = n);
  }
  
  function showSlides(n) {
    var i;
    var slides = document.getElementsByClassName("mySlides");
    var dots = document.getElementsByClassName("dot");
    if (n > slides.length) {slideIndex = 1}    
    if (n < 1) {slideIndex = slides.length}
    for (i = 0; i < slides.length; i++) {
        slides[i].style.display = "none";  
    }
    for (i = 0; i < dots.length; i++) {
        dots[i].className = dots[i].className.replace(" active", "");
    }
    slides[slideIndex-1].style.display = "block";  
    dots[slideIndex-1].className += " active";
  }


  </script>
</body>
</html>
